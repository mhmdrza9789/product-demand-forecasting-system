artifacts_root: artifacts

data_ingestion:
  root_dir: artifacts/data_ingestion
  source_file: Retail_Dataset2.csv
  local_data_file: artifacts/data_ingestion/Retail_Dataset2.csv

data_validation:
  root_dir: artifacts/data_validation
  data_file: artifacts/data_ingestion/Retail_Dataset2.csv
  status_file: artifacts/data_validation/status.txt

data_transformation:
  root_dir: artifacts/data_transformation
  data_path: artifacts/data_ingestion/Retail_Dataset2.csv
  regression_dir: artifacts/data_transformation/regression
  ensemble_dir: artifacts/data_transformation/ensemble
  lstm_dir: artifacts/data_transformation/lstm
  scaler_name: scaler.pkl
  lstm_scaler_name: lstm_scaler.pkl


model_trainer:
  root_dir: artifacts/model_trainer
  train_data_path: artifacts/data_transformation/regression/train.csv
  test_data_path: artifacts/data_transformation/regression/test.csv
  model_name: model.joblib

model_evaluation:
  root_dir: artifacts/model_evaluation
  test_data_path: artifacts/data_transformation/test.csv
  model_path: artifacts/model_trainer/model.joblib
  metric_file_name: artifacts/model_evaluation/metrics.json
